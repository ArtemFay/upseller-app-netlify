<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Upseller</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #0f172a;
      --fg: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --card-bg: rgba(30, 41, 59, 0.75);
      --card-border: rgba(148, 163, 184, 0.2);
      --danger: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at top, #1e293b 0%, var(--bg) 70%);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 420px;
      padding: 40px 32px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      text-align: center;
    }
    .brand {
      display: inline-block;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--accent);
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 999px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .lead {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .gsi-wrap {
      display: flex;
      justify-content: center;
      min-height: 48px;
      margin-bottom: 20px;
    }
    .hint {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .error {
      display: none;
      padding: 12px 14px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 10px;
      color: var(--danger);
      font-size: 13px;
      line-height: 1.5;
      text-align: left;
      margin-bottom: 20px;
    }
    .error.visible { display: block; }
    .config-error {
      padding: 20px;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 12px;
      color: var(--danger);
      font-size: 13px;
      line-height: 1.5;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="brand">Upseller</span>
    <h1>Вход</h1>
    <p class="lead">Войдите через Google, используя одобренный email.</p>

    <div id="error" class="error"></div>

    <div id="signin-area">
      <div class="gsi-wrap" id="gsi-wrap"></div>
      <p class="hint">Если вашего email нет в списке разрешённых — обратитесь к администратору.</p>
    </div>

    <div id="config-error" class="config-error" style="display:none"></div>
  </div>

  <script>
    const errorBox = document.getElementById('error');
    const configErrorBox = document.getElementById('config-error');
    const signinArea = document.getElementById('signin-area');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('visible');
    }

    function showConfigError(msg) {
      signinArea.style.display = 'none';
      configErrorBox.style.display = 'block';
      configErrorBox.textContent = msg;
    }

    async function handleSignIn(response) {
      errorBox.classList.remove('visible');
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken: response.credential }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showError(data.error || ('HTTP ' + res.status));
          return;
        }
        const params = new URLSearchParams(location.search);
        const next = params.get('next') || '/';
        location.href = next.startsWith('/') ? next : '/';
      } catch (e) {
        showError(e.message || String(e));
      }
    }

    window.addEventListener('load', async () => {
      // Если уже авторизован — сразу на главную
      try {
        const meRes = await fetch('/api/auth/me');
        const meData = await meRes.json();
        if (meData.user) {
          const params = new URLSearchParams(location.search);
          const next = params.get('next') || '/';
          location.replace(next.startsWith('/') ? next : '/');
          return;
        }
        // Локальный dev-режим: AUTH_DISABLED=true → пропускаем Google, логинимся как dev@local.
        if (meData.devMode) {
          await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
          const params = new URLSearchParams(location.search);
          const next = params.get('next') || '/';
          location.replace(next.startsWith('/') ? next : '/');
          return;
        }
        if (!meData.googleClientId) {
          showConfigError('Авторизация пока не настроена: не задан GOOGLE_WEB_CLIENT_ID на сервере. Скажите администратору, что он должен завершить настройку.');
          return;
        }
        renderSignInButton(meData.googleClientId);
      } catch (e) {
        showError('Не удалось связаться с сервером: ' + (e.message || String(e)));
      }
    });

    function renderSignInButton(clientId) {
      const wait = setInterval(() => {
        if (window.google && google.accounts && google.accounts.id) {
          clearInterval(wait);
          google.accounts.id.initialize({
            client_id: clientId,
            callback: handleSignIn,
            ux_mode: 'popup',
          });
          google.accounts.id.renderButton(document.getElementById('gsi-wrap'), {
            type: 'standard',
            theme: 'filled_blue',
            size: 'large',
            text: 'signin_with',
            shape: 'pill',
            logo_alignment: 'left',
            locale: 'ru',
          });
        }
      }, 100);
    }
  </script>
</body>
</html>
