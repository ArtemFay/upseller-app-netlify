<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upseller — Архив заявки</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/podbor/style.css">
</head>
<body class="auth-hidden">
  <header class="topbar">
    <div class="title">
      <a href="/podbor/archive.html" class="back-btn" title="К списку">←</a>
      <a href="/" class="home-link" title="На главную">🏠</a>
      📜 Архив заявки
    </div>
    <div class="topbar-spacer"></div>
    <div class="user-chip" id="userChip" title="Пользователь">
      <span class="user-avatar" id="userAvatar">?</span>
      <span class="user-name" id="userName">—</span>
    </div>
  </header>

  <main id="archDetail" class="arch-detail">
    <div class="arch-placeholder">Загружаем…</div>
  </main>

  <script>
    (async () => {
      try {
        const res = await fetch('/api/auth/me');
        const data = await res.json();
        if (!data.user) { location.replace('/login/?next=' + encodeURIComponent(location.pathname + location.search)); return; }
        window.__USER__ = data.user;
        document.body.classList.remove('auth-hidden');
        const s = document.createElement('script');
        s.src = '/podbor/archive-detail.js';
        document.body.appendChild(s);
      } catch (e) {
        location.replace('/login/');
      }
    })();
  </script>
</body>
</html>
