[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"
  # Глобально не бандлим googleapis (слишком большой и ESM-несовместимый при tree-shake esbuild).
  # Любая функция, импортирующая _lib/google.js, получит googleapis как external (через node_modules).
  external_node_modules = ["googleapis"]

[functions."invent-view"]
  external_node_modules = ["googleapis"]
  included_files = ["netlify/functions/_lib/invent/**"]

[functions."invent-run"]
  external_node_modules = ["googleapis"]
  included_files = ["netlify/functions/_lib/invent/**"]

[functions."podbor-zayavki-list"]
  external_node_modules = ["googleapis"]
  included_files = ["netlify/functions/_lib/podbor/**"]

[functions."podbor-load"]
  external_node_modules = ["googleapis"]
  included_files = ["netlify/functions/_lib/podbor/**"]

[functions."podbor-sync"]
  included_files = ["netlify/functions/_lib/podbor/**"]

[[redirects]]
  from = "/invent-tablet"
  to = "/.netlify/functions/invent-view"
  status = 200

[[redirects]]
  from = "/invent-tablet/"
  to = "/.netlify/functions/invent-view"
  status = 200

# Подборы: статичный фронт + три функции бэка (zayavki-list / load / sync)
[[redirects]]
  from = "/api/podbor/zayavki-list"
  to = "/.netlify/functions/podbor-zayavki-list"
  status = 200

[[redirects]]
  from = "/api/podbor/load"
  to = "/.netlify/functions/podbor-load"
  status = 200

[[redirects]]
  from = "/api/podbor/sync"
  to = "/.netlify/functions/podbor-sync"
  status = 200

# Специфичные auth-роуты (проверяются первыми)
[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/auth-logout"
  status = 200

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200

# Общий fallback для остальных /api/*
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
